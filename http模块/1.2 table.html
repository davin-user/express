
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    table, th, td {
      border: 1px solid black;
    }
    th, td {
      padding: 10px;
    }
    tr:nth-child(even) {
      background-color: #acf;
    }
    tr:nth-child(odd) {
      background-color: #fcb;
    }
  </style>
</head>
<body>
  <table border="1">
    <tr>
      <th>姓名</th>
      <th>年龄</th>
      <th>性别</th>
    </tr>
    <tr>
      <td>张三</td>
      <td>18</td>
      <td>男</td>
    </tr>
    <tr>
      <td>张三</td>
      <td>18</td>
      <td>男</td>
    </tr>
    <tr>
      <td>张三</td>
      <td>18</td>
      <td>男</td>
    </tr>
  </table>
  <script>
    const tds = document.querySelectorAll('td');
    tds.forEach(item => {
      item.onclick = function () {
        item.style.backgroundColor = 'skyblue';
      }
    })
  </script>
</body>
</html>
